<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Solana Scanner — Risk Raporu</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app hidden" id="app">
    <header class="header">
      <p class="eyebrow">Solana Scanner</p>
      <h1 id="symbol">—</h1>
      <p class="sub" id="levelBadge">—</p>
    </header>

    <section class="trust-card">
      <div class="ring" id="trustRing">
        <span class="score" id="trustScore">—</span>
        <span class="score-label" id="trustLabel">güven</span>
      </div>
      <p class="tier" id="trustTier">—</p>
      <p class="verdict" id="trustVerdict"></p>
    </section>

    <section class="summary-grid" id="summaryGrid"></section>

    <div id="sections"></div>

    <footer class="footer">
      <p class="footnote">DYOR — Bu rapor otomatik üretilmiştir.</p>
    </footer>
  </div>

  <div class="loading" id="loading">Rapor yükleniyor…</div>
  <div class="error hidden" id="error">Rapor bulunamadı veya süresi doldu.</div>

  <script src="app.js"></script>
</body>
</html>

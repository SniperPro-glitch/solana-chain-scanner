    <!-- ══════════ AYARLAR (admin_06) ══════════ -->
    <div class="page" id="page-settings">
      <div class="grid-2">
        <div class="card">
          <div class="card-title">Admin Hesabı</div>
          <div class="input-group"><div class="input-label">KULLANICI ADI</div><input class="input" type="text" id="settingsUsername" autocomplete="username" /></div>
          <div class="input-group"><div class="input-label">MEVCUT ŞİFRE</div><input class="input" type="password" id="settingsCurrentPass" autocomplete="current-password" /></div>
          <div class="input-group"><div class="input-label">YENİ ŞİFRE</div><input class="input" type="password" id="settingsNewPass" autocomplete="new-password" /></div>
          <p id="settingsPassStatus" class="banner-admin-status" role="status"></p>
          <button type="button" class="btn btn-primary btn-md" id="settingsChangePass">Şifreyi Güncelle</button>
        </div>
        <div class="card">
          <div class="card-title">Genel Ayarlar</div>
          <div class="input-group"><div class="input-label">SİTE BAŞLIĞI</div><input class="input" type="text" id="settingsSiteTitle" /></div>
          <div class="input-group"><div class="input-label">VARSAYILAN DİL</div><input class="input" type="text" id="settingsLang" placeholder="tr / en" /></div>
          <div class="input-group"><div class="input-label">FEED YENİLEME (SN)</div><input class="input" type="number" id="settingsFeedRefresh" min="5" /></div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
            <span style="font-size:12px;color:var(--muted);">Bakım Modu</span>
            <label class="toggle"><input type="checkbox" id="settingsMaintenance" /><span class="toggle-slider"></span></label>
          </div>
          <p id="settingsStatus" class="banner-admin-status" role="status"></p>
          <button type="button" class="btn btn-primary btn-md" id="settingsSave">Kaydet</button>
        </div>
      </div>
    </div>

# Railway — kalıcı kanal ayarları için Volume ekleyin (Dashboard → service → Volumes)
# Mount path: /data
# Kod otomatik olarak /data kullanır (RAILWAY_VOLUME_MOUNT_PATH veya /data dizini varsa)

[deploy]
numReplicas = 1
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
